services:
  - type: web
    name: auto-ds-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: OPENROUTER_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: TIDB_URL
        value: mysql --comments -u '2zSvroz3eJhSWyZ.root' -h gateway01.ap-southeast-1.prod.alicloud.tidbcloud.com -P 4000 -D 'test' --ssl-mode=VERIFY_IDENTITY --ssl-ca=<CA_PATH> -p'jnOymssFprrBCdr5'
        sync: true
      - key: TIDB_CA_PATH
        value: ./isrgrootx1.pem
